map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP → HTTPS (домены в generated/nginx/nodes/*.conf).
server {
    listen 80 default_server;
    server_name _;

    return 301 https://$host$request_uri;
}

# По одному файлу на ноду: deploy.sh → generated/nginx/nodes/node-fl-1.conf и т.д.
include /etc/nginx/conf.d/nodes/*.conf;
