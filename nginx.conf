# HTTP landing + per-node API includes from generated/nginx/nodes/*.conf
server {
    listen 80 default_server;
    server_name _;

    root /etc/nginx/html;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
        return 204;
    }
}

include /etc/nginx/conf.d/nodes/*.conf;
