listen: :443

tls:
  cert: /etc/hysteria/certs/fullchain.pem
  key: /etc/hysteria/certs/privkey.pem

auth:
  type: http
  http:
    url: http://nest-app:5000/internal/hysteria/auth
    insecure: true

trafficStats:
  listen: :9999
  secret: "{{TRAFFIC_STATS_SECRET}}"

masquerade:
  type: proxy
  proxy:
    url: https://www.bing.com

quic:
  maxIdleTimeout: 120s
  keepAlivePeriod: 10s

udpIdleTimeout: 600s

bandwidth:
  up: 1 gbps
  down: 1 gbps
